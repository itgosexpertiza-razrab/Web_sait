{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container my-5">

    <p class="text-muted">{{ post.date }}</p>
    <h2 class="fw-bold mb-3">{{ post.title }}</h2>

    <div class="mb-4">
        <img src="{{ post.image.url }}" class="img-fluid rounded">

        {% if user.has_perm("sites.change_post") %}
            <div class="mt-2">
                <a href="{% url 'post_image_edit' post.id %}"
                class="btn btn-sm btn-outline-secondary">
                ✏ Изменить изображение
                </a>
            </div>
        {% endif %}
    </div>  

    <div class="content-block" style="line-height:1.7;">
        {{ post.content|safe }}
    </div>
</div>
{% endblock %}
