{% extends "base.html" %}
{% block content %}

<div class="container my-5" style="max-width: 500px;">
  <h4 class="mb-3">Изменить изображение</h4>

  {% if object.image %}
    <img src="{{ object.image.url }}" class="img-fluid mb-3 rounded">
  {% endif %}

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-primary">
      Сохранить
    </button>
    <a href="{{ object.get_absolute_url }}" class="btn btn-secondary">
      Отмена
    </a>
  </form>
</div>

{% endblock %}
